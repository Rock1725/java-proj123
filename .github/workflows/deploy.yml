name: Deploy to EC2

on:
  push:
    branches:
      - main # Triggers the workflow on push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Set up SSH Key
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

    - name: Test JWT_PUBLIC_JWK systemd injection
      env:
        EC2_USER: ${{ secrets.EC2_USER }}
        EC2_HOST: ${{ secrets.EC2_HOST }}

        JWT_PUBLIC_JWK: ${{ secrets.JWT_PUBLIC_JWK }}

      run: |
        set -e

        # Encode JSON safely
        JWT_B64=$(echo "$JWT_PUBLIC_JWK" | base64 -w 0)

        ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST \
        JWT_B64="$JWT_B64" \
        EC2_USER="$EC2_USER" \
        bash << 'ENDSSH'

          set -e

          JWT_PUBLIC_JWK=$(echo "$JWT_B64" | base64 -d)

          echo "Decoded JWT:"
          echo "$JWT_PUBLIC_JWK"

          # Create dummy service
          sudo tee /etc/systemd/system/test-jwt.service > /dev/null << EOF
        [Unit]
        Description=Test JWT Environment

        [Service]
        Type=oneshot
        Environment='JWT_PUBLIC_JWK=$JWT_PUBLIC_JWK'
        ExecStart=/bin/bash -c 'echo "JWT VALUE => \$JWT_PUBLIC_JWK"'

        [Install]
        WantedBy=multi-user.target
        EOF

          sudo systemctl daemon-reload

          echo "================ SERVICE FILE ================"
          sudo cat /etc/systemd/system/test-jwt.service

          echo "================ RUN SERVICE ================="
          sudo systemctl start test-jwt.service

          echo "================ LOG OUTPUT =================="
          sudo journalctl -u test-jwt.service --no-pager

        ENDSSH
